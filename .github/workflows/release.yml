name: Release

on:
  push:
    branches:
      - main
  pull_request:
    types: [ closed ]
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest

    # Skip bot pushes (bump commits) and only run on merged PRs (not closed-without-merge)
    if: >-
      github.actor != 'love-docs-Release-Bot[bot]' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
      )

    permissions:
      contents: write

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Configure Git Identity
        run: |
          git config user.name "love-docs-Release-Bot"
          git config user.email "love-docs-Release-Bot@users.noreply.github.com"

      - name: Semver Release with Cocogitto
        id: release
        uses: cocogitto/cocogitto-action@v3
        with:
          release: true
          git-user: "love-docs-Release-Bot"
          git-user-email: "love-docs-Release-Bot@users.noreply.github.com"

      - name: Create GitHub Release
        if: steps.release.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          name: v${{ steps.release.outputs.version }}
          generate_release_notes: false
          body_path: CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
