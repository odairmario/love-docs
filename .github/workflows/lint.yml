name: Lint Commits
on:
  pull_request:
    branches: [main, develop ]

jobs:
  commit_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Cocogitto Check
        uses: cocogitto/cocogitto-action@v3
        with:
          check: true # Only validates formatting
